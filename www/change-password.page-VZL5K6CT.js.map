<ion-content class="auth-content">
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Cambiar contrasena</h1>
      <p class="subtitle">Actualiza la contrasena de tu cuenta.</p>

      <ion-item>
        <ion-label position="floating">Contrasena actual</ion-label>
        <ion-input
          [(ngModel)]="currentPassword"
          name="currentPassword"
          type="password">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Nueva contrasena</ion-label>
        <ion-input
          [(ngModel)]="newPassword"
          name="newPassword"
          type="password">
        </ion-input>
      </ion-item>

      <ion-button
        expand="block"
        class="primary-button"
        [disabled]="loading || currentPassword.length < 6 || newPassword.length < 6"
        (click)="changePassword()">
        @if (loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Guardar contrasena
        }
      </ion-button>

      <ion-button fill="clear" expand="block" routerLink="/dashboard">
        Volver
      </ion-button>

      @if (errorMessage) {
        <ion-text color="danger">
          <p>{{ errorMessage }}</p>
        </ion-text>
      }

      @if (successMessage) {
        <ion-text color="success">
          <p>{{ successMessage }}</p>
        </ion-text>
      }
    </div>
  </div>
</ion-content>
