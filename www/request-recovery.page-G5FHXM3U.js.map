<ion-content class="auth-content">
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Recuperar contrasena</h1>
      <p class="subtitle">Ingresa tu correo registrado.</p>

      <ion-item>
        <ion-label position="floating">Correo</ion-label>
        <ion-input
          [(ngModel)]="email"
          name="email"
          type="email">
        </ion-input>
      </ion-item>

      <ion-button
        expand="block"
        class="primary-button"
        [disabled]="loading || !email"
        (click)="requestRecovery()">
        @if (loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Enviar codigo
        }
      </ion-button>

      <ion-button fill="clear" expand="block" routerLink="/login">
        Volver al login
      </ion-button>

      @if (errorMessage) {
        <ion-text color="danger">
          <p>{{ errorMessage }}</p>
        </ion-text>
      }

      @if (successMessage) {
        <ion-text color="success">
          <p>{{ successMessage }}</p>
        </ion-text>
      }
    </div>
  </div>
</ion-content>
