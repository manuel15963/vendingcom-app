<ion-modal class="success-modal" [isOpen]="state().open" (didDismiss)="close()">
  <ng-template>
    <div class="success-shell">
      <button class="success-close" (click)="close()" aria-label="Cerrar">✕</button>

      <div class="success-badge">
        <span class="spark spark-1"></span>
        <span class="spark spark-2"></span>
        <span class="spark spark-3"></span>
        <span class="spark spark-4"></span>
        <span class="spark spark-5"></span>
        <div class="success-circle">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 13l4 4L19 7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <h2>{{ state().title }}</h2>
      @if (state().message) { <p>{{ state().message }}</p> }

      <button class="success-ok" (click)="close()">Entendido</button>
    </div>
  </ng-template>
</ion-modal>
