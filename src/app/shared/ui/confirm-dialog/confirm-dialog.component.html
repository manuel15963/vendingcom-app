<ion-modal class="confirm-modal" [isOpen]="open" (didDismiss)="cancelled.emit()">
  <ng-template>
    <div class="confirm-shell" [class.is-danger]="variant === 'danger'">
      <div class="confirm-icon">
        @if (variant === 'danger') {
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        } @else {
          <svg viewBox="0 0 24 24"><path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 8h.01M11 12h1v4h1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        }
      </div>

      <h3>{{ title }}</h3>
      @if (message) { <p>{{ message }}</p> }

      <div class="confirm-actions">
        <button class="btn cancel" (click)="cancelled.emit()" [disabled]="busy">Cancelar</button>
        <button class="btn confirm" (click)="confirmed.emit()" [disabled]="busy">
          @if (busy) { <ion-spinner name="crescent"></ion-spinner> } @else { {{ confirmText }} }
        </button>
      </div>
    </div>
  </ng-template>
</ion-modal>
