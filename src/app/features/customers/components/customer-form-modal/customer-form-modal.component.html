<ion-modal class="form-modal" [isOpen]="open" (didDismiss)="closed.emit()">
  <ng-template>
    <div class="modal-shell">
      <div class="modal-top">
        <h3>{{ title }}</h3>
        <button class="modal-close" (click)="close()" aria-label="Cerrar">✕</button>
      </div>

      <div class="modal-body">
        @if (loading) {
          <div class="loading"><ion-spinner name="crescent"></ion-spinner></div>
        } @else {
          <p class="hint">Empresa, institución o persona. Los campos con * son obligatorios.</p>

          <div class="form-grid">
            <ion-input label="Razón social *" labelPlacement="stacked" fill="outline"
              placeholder="Ingrese la razón social"
              [(ngModel)]="form.businessName" name="businessName" maxlength="150">
              <ion-icon slot="start" name="business-outline" aria-hidden="true"></ion-icon>
            </ion-input>

            <ion-select label="Tipo de cliente *" labelPlacement="stacked" fill="outline"
              [(ngModel)]="form.customerTypeId" name="customerTypeId" interface="popover"
              placeholder="Seleccione el tipo">
              <ion-icon slot="start" name="people-outline" aria-hidden="true"></ion-icon>
              @for (type of customerTypes; track type.parameterId) {
                <ion-select-option [value]="type.parameterId">{{ type.parameterValue }}</ion-select-option>
              }
            </ion-select>

            <ion-input label="Nombre comercial" labelPlacement="stacked" fill="outline"
              placeholder="Ingrese el nombre comercial"
              [(ngModel)]="form.tradeName" name="tradeName" maxlength="150">
              <ion-icon slot="start" name="pricetag-outline" aria-hidden="true"></ion-icon>
            </ion-input>

            <ion-input label="Correo principal" labelPlacement="stacked" fill="outline" type="email"
              placeholder="ejemplo@correo.com"
              [(ngModel)]="form.mainEmail" name="mainEmail" maxlength="120">
              <ion-icon slot="start" name="mail-outline" aria-hidden="true"></ion-icon>
            </ion-input>

            <ion-input label="Teléfono principal" labelPlacement="stacked" fill="outline"
              placeholder="Ingrese el teléfono"
              [(ngModel)]="form.mainPhone" name="mainPhone" maxlength="20">
              <ion-icon slot="start" name="call-outline" aria-hidden="true"></ion-icon>
            </ion-input>

            <ion-input label="Sitio web" labelPlacement="stacked" fill="outline"
              placeholder="www.ejemplo.com (opcional)"
              [(ngModel)]="form.website" name="website" maxlength="150">
              <ion-icon slot="start" name="globe-outline" aria-hidden="true"></ion-icon>
            </ion-input>
          </div>

          @if (errorMessage) {
            <div class="error-box">{{ errorMessage }}</div>
          }

          <button class="primary-btn" [disabled]="saving || !canSubmit" (click)="save()">
            @if (saving) {
              <ion-spinner name="crescent"></ion-spinner>
              <span>Guardando…</span>
            } @else {
              {{ isEdit ? 'Guardar cambios' : 'Crear cliente' }}
            }
          </button>
        }
      </div>
    </div>
  </ng-template>
</ion-modal>

<!-- Confirmación al guardar una edición -->
<app-confirm-dialog
  [open]="editConfirmOpen"
  title="¿Guardar cambios?"
  message="Se actualizarán los datos de este cliente."
  confirmText="Guardar cambios"
  (confirmed)="onEditConfirm()"
  (cancelled)="editConfirmOpen = false">
</app-confirm-dialog>
