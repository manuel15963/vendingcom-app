<ion-content class="login-content">

  <div class="login-wrapper">

    <div class="login-card">

      <h1>VendingCom</h1>
      <p class="subtitle">Inicio de sesión</p>

      <ion-item>
        <ion-label position="floating">Usuario</ion-label>
        <ion-input
          [(ngModel)]="username"
          name="username"
          type="text">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input
          [(ngModel)]="password"
          name="password"
          type="password">
        </ion-input>
      </ion-item>

      <ion-button
        expand="block"
        class="login-button"
        [disabled]="loading"
        (click)="login()">

        @if (loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Iniciar sesión
        }

      </ion-button>

      @if (errorMessage) {
        <ion-text color="danger">
          <p>{{ errorMessage }}</p>
        </ion-text>
      }

      @if (successMessage) {
        <ion-text color="success">
          <p>{{ successMessage }}</p>
        </ion-text>
      }

    </div>

  </div>

</ion-content>
